<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .d1{
        background-color: red;
        width: 100px;
        height: 100px;
        
        
    }
    </style>
</head>
<body>
    <label for="">name:</label><input type="text" id="in1"><br>
    <p id="p1"></p>
    <label for="">enter the color:</label><input type="color" id="in2"><br>
    <label for="">height:</label><input type="number" id="h1"><br>
    <label for="">width:</label><input type="number" id="w1"><br>
    <label for="">border width:</label><input type="number" id="b1"><br>
    <label for="">border color:</label><input type="color" id="b2">
    <div id="div1"  class="d1">

    </div>
    <script>
        let z= document.getElementById("b2").value

        document.getElementById("in1").addEventListener("input",()=>{
            let a = document.getElementById("in1").value;
        document.getElementById("p1").innerHTML = "my name is "+a
        })

        document.getElementById("in2").addEventListener("input",()=>{
            let b= document.getElementById("in2").value
            document.getElementById("div1").style.backgroundColor = b
        })

        document.getElementById("h1").addEventListener("input",()=>{
            let c= document.getElementById("h1").value
            document.getElementById("div1").style.height=c+"px"
         })

        document.getElementById("w1").addEventListener("input",()=>{
            let c= document.getElementById("w1").value
            document.getElementById("div1").style.width=c+"px"
         })

        document.getElementById("b1").addEventListener("input",()=>{
            let border_width= document.getElementById("b1").value
            let border_color= document.getElementById("b2").value
            
            document.getElementById("div1").style.border=`${border_width}px solid ${border_color}`
        })

        document.getElementById("b2").addEventListener("input",()=>{
            let d= document.getElementById("b2").value
            document.getElementById("div1").style.borderColor=d
        })

        

    </script>
    
</body>
</html>
